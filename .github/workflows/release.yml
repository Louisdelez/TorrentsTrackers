name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v0.1.0). Will create the release if absent."
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop-bundles:
    name: Desktop bundles (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artefact_glob: |
              apps/desktop/src-tauri/target/release/bundle/deb/*.deb
              apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
              apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          - os: macos-14
            artefact_glob: |
              apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
              apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
          - os: windows-latest
            artefact_glob: |
              apps/desktop/src-tauri/target/release/bundle/msi/*.msi
              apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/desktop/src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install Linux GTK / WebKit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Tauri build
        working-directory: apps/desktop
        run: pnpm tauri build

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.artefact_glob }}
          fail_on_unmatched_files: false
          generate_release_notes: true

  cli-binaries:
    name: CLI + chat-server (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/chat-server

      - name: Build tt CLI
        run: cargo build --release -p tt-cli --target ${{ matrix.target }}

      - name: Build tt-chat-server
        working-directory: apps/chat-server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artefacts
        shell: bash
        run: |
          mkdir -p artefacts
          cp "target/${{ matrix.target }}/release/tt${{ matrix.ext }}" \
             "artefacts/tt-${{ matrix.target }}${{ matrix.ext }}"
          cp "apps/chat-server/target/${{ matrix.target }}/release/tt-chat-server${{ matrix.ext }}" \
             "artefacts/tt-chat-server-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: artefacts/*
          fail_on_unmatched_files: false
          generate_release_notes: true
