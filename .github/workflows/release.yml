name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v0.2.0). Will create the release if absent."
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop-bundles:
    name: Desktop bundles (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            updater_platform: linux-x86_64
            artefact_glob: |
              apps/desktop/src-tauri/target/release/bundle/deb/*.deb
              apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
              apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
          - os: macos-14
            updater_platform: darwin-aarch64
            artefact_glob: |
              apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
              apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
              apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          - os: windows-latest
            updater_platform: windows-x86_64
            artefact_glob: |
              apps/desktop/src-tauri/target/release/bundle/msi/*.msi
              apps/desktop/src-tauri/target/release/bundle/msi/*.msi.sig
              apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
              apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/desktop/src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install Linux GTK / WebKit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Tauri build (signed)
        working-directory: apps/desktop
        run: pnpm tauri build

      - name: Upload bundles to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.artefact_glob }}
          fail_on_unmatched_files: false
          generate_release_notes: true

  cli-binaries:
    name: CLI + chat-server (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/chat-server

      - name: Build tt CLI
        run: cargo build --release -p tt-cli --target ${{ matrix.target }}

      - name: Build tt-chat-server
        working-directory: apps/chat-server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artefacts
        shell: bash
        run: |
          mkdir -p artefacts
          cp "target/${{ matrix.target }}/release/tt${{ matrix.ext }}" \
             "artefacts/tt-${{ matrix.target }}${{ matrix.ext }}"
          cp "apps/chat-server/target/${{ matrix.target }}/release/tt-chat-server${{ matrix.ext }}" \
             "artefacts/tt-chat-server-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: artefacts/*
          fail_on_unmatched_files: false
          generate_release_notes: true

  updater-manifest:
    name: Generate latest.json
    needs: [desktop-bundles]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download .sig files from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p sigs
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sig" \
            --dir sigs/ || echo "no sig files yet"
          ls -la sigs/

      - name: Build latest.json
        id: manifest
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -e
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOTES=$(printf "TorrentsTrackers %s\n\nSee CHANGELOG.md for details." "$VERSION")

          read_sig() {
            local pattern="$1"
            local f
            f=$(ls sigs/$pattern 2>/dev/null | head -1)
            if [ -n "$f" ] && [ -f "$f" ]; then
              cat "$f"
            else
              echo ""
            fi
          }

          LINUX_SIG=$(read_sig "*amd64.AppImage.sig")
          MAC_SIG=$(read_sig "*.app.tar.gz.sig")
          WIN_SIG=$(read_sig "*-setup.exe.sig")
          if [ -z "$WIN_SIG" ]; then
            WIN_SIG=$(read_sig "*.msi.sig")
          fi

          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          jq -n \
            --arg version  "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes    "$NOTES" \
            --arg linux_url "${BASE}/TorrentsTrackers_${VERSION}_amd64.AppImage" \
            --arg linux_sig "$LINUX_SIG" \
            --arg mac_url   "${BASE}/TorrentsTrackers_${VERSION}_aarch64.app.tar.gz" \
            --arg mac_sig   "$MAC_SIG" \
            --arg win_url   "${BASE}/TorrentsTrackers_${VERSION}_x64-setup.exe" \
            --arg win_sig   "$WIN_SIG" \
            '{
              version: $version,
              pub_date: $pub_date,
              notes: $notes,
              platforms: (
                {} +
                ( if $linux_sig != "" then { "linux-x86_64": { signature: $linux_sig, url: $linux_url } } else {} end ) +
                ( if $mac_sig   != "" then { "darwin-aarch64": { signature: $mac_sig, url: $mac_url } } else {} end ) +
                ( if $win_sig   != "" then { "windows-x86_64": { signature: $win_sig, url: $win_url } } else {} end )
              )
            }' > latest.json

          cat latest.json

      - name: Upload latest.json to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: latest.json
          fail_on_unmatched_files: true
