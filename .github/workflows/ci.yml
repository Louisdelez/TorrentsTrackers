name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  workspace:
    name: Workspace (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/desktop/src-tauri
            apps/chat-server

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Tests
        run: cargo test --workspace --no-fail-fast

  chat-server:
    name: chat-server (build + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/chat-server
      - name: Format
        working-directory: apps/chat-server
        run: cargo fmt --check
      - name: Clippy
        working-directory: apps/chat-server
        run: cargo clippy --all-targets
      - name: Build
        working-directory: apps/chat-server
        run: cargo build --release

  desktop-frontend:
    name: desktop frontend (Svelte)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

  desktop-tauri:
    name: desktop Tauri (build only, no bundle)
    runs-on: ubuntu-latest
    needs: desktop-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - name: Install GTK / WebKit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: pnpm install + build frontend
        working-directory: apps/desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: cargo build
        working-directory: apps/desktop/src-tauri
        run: cargo build --release
